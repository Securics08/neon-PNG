.card { background: rgba(0,0,0,0.85); padding: 25px; border-radius: 20px; width: 480px; max-height: 85vh; text-align: center; box-shadow: 0 0 30px rgba(106, 0, 255, 0.3); overflow-y: auto; }
.grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 15px; }
.card button { padding: 8px; border-radius: 6px; border: none; background: var(--accent); color: white; font-weight: bold; cursor: pointer; font-size: 11px; }

/* JEGYZET */
#topbar { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px; background: var(--panel); border-bottom: 2px solid var(--border); align-items: center; }
#container { position: relative; width: 100vw; height: calc(100vh - 180px); background: rgba(0,0,0,0.7); overflow: hidden; }
#editor, #highlight { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; border: none; outline: none; line-height: 1.6; font-size: 25px; white-space: pre-wrap; word-wrap: break-word; margin: 0; overflow-y: auto; }
#editor { background: transparent; color: transparent; caret-color: white; z-index: 2; resize: none; }
#highlight { z-index: 1; color: inherit; pointer-events: none; }
.zenburn-mode .token-section { color: #8cd0d3 !important; font-weight: bold; }
.zenburn-mode .token-key { color: #f0ef9d !important; }
.zenburn-mode .token-comment { color: #7f9f7f !important; font-style: italic; }
#stats { position: fixed; bottom: 10px; right: 20px; font-family: 'VT323'; font-size: 20px; color: #00ff00; pointer-events: none; z-index: 10; }

button { background:#000; color:var(--text); border:1px solid var(--border); padding:6px 10px; border-radius:4px; cursor:pointer; }

<script>
function showSection(id, btn) {
    document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

/* SCREENSHOT */
let stream = null, targetW, targetH, baseScale = 1;
const wS = document.getElementById("wS"), hS = document.getElementById("hS");
wS.oninput = () => document.getElementById("wL").textContent = wS.value;
hS.oninput = () => document.getElementById("hL").textContent = hS.value;

async function capture(w, h) { targetW = w; targetH = h; try { stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "never" } }); showEditor(); } catch (e) {} }
function captureSlider() { capture(parseInt(wS.value), parseInt(hS.value)); }

function showEditor() {
    const ov = document.createElement('div'); ov.className = 'overlay';
    ov.innerHTML = `<div class="editor-box"><h3>Vágás ; Crop</h3><div class="zoom-container" id="box"><video id="previewVideo" autoplay playsinline></video></div><div style="margin-top:20px;"><button onclick="saveImg()" style="background:#28a745; color:white; padding:10px 20px;">💾 Mentés PNG</button> <button id="ce" style="background:#cc0000; color:white; padding:10px 20px;">Bezár</button></div></div>`;
    document.body.appendChild(ov);
    const video = document.getElementById('previewVideo'); const box = document.getElementById('box'); video.srcObject = stream;
    video.onloadedmetadata = () => {
        baseScale = Math.min(box.offsetWidth / video.videoWidth, box.offsetHeight / video.videoHeight);
        video.style.width = (video.videoWidth * baseScale) + "px"; video.style.left = ((box.offsetWidth - video.videoWidth * baseScale)/2) + "px"; video.style.top = ((box.offsetHeight - video.videoHeight * baseScale)/2) + "px";
    };
    document.getElementById('ce').onclick = () => { document.body.removeChild(ov); if(stream) stream.getTracks().forEach(t => t.stop()); };
}
function saveImg() {
    const v = document.getElementById('previewVideo'); const c = document.createElement('canvas'); c.width = targetW; c.height = targetH;
    const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, v.videoWidth, v.videoHeight, 0, 0, targetW, targetH);
    const a = document.createElement('a'); a.download = `shot.png`; a.href = c.toDataURL(); a.click();
}

/* DISCORD INI SZÁMLÁLÓ */
function updateIniCounter() {
    const text = document.getElementById('textIni').value;
    const counter = document.getElementById('iniCounter');
    const len = text.length;
    counter.innerText = `Karakterek: ${len} / 4000`;
    if(len > 3800) counter.classList.add('counter-danger');
    else counter.classList.remove('counter-danger');
}
function showINI() { 
    document.getElementById('iniContainer').style.display='block'; 
    updateIniCounter();
}
function copyIni() { navigator.clipboard.writeText("```ini\n" + document.getElementById('textIni').value + "\n```"); alert("Másolva!"); }

/* NOTE */
let notes = JSON.parse(localStorage.getItem("MY_NOTES")) || {"Jegyzet_1": ""};
let current = Object.keys(notes)[0];
const editor = document.getElementById("editor"); const highlight = document.getElementById("highlight");

function applyHighlight() {
    let html = editor.value.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    if (document.body.classList.contains("zenburn-mode")) {
        html = html.replace(/(\[.*?\])/g, '<span class="token-section">$1</span>').replace(/^([\w\s]+=)/gm, '<span class="token-key">$1</span>').replace(/(;.*$)/gm, '<span class="token-comment">$1</span>');
    }
    highlight.innerHTML = html + (editor.value.endsWith('\n') ? ' ' : '');
}
function handleInput() {
    notes[current] = editor.value; applyHighlight();
    document.getElementById("stats").innerText = `Szavak: ${editor.value.trim() ? editor.value.trim().split(/\s+/).length : 0} | Karakterek: ${editor.value.length}`;
    localStorage.setItem("MY_NOTES", JSON.stringify(notes));
}
function syncScroll() { highlight.scrollTop = editor.scrollTop; }
function switchNote() { current = document.getElementById("notes").value; editor.value = notes[current] || ""; handleInput(); }
function newNote() { let n = prompt("Név:"); if(n){notes[n]=""; current=n; refresh();} }
function deleteNote() { if(Object.keys(notes).length > 1) { if(confirm("Törlöd ezt a jegyzetet?")) { delete notes[current]; current = Object.keys(notes)[0]; refresh(); } } else { notes[current] = ""; handleInput(); } }
function resetAll() { if(confirm("MINDEN jegyzetet törölni szeretnél?")) { localStorage.removeItem("MY_NOTES"); notes = {"Jegyzet_1": ""}; current = "Jegyzet_1"; refresh(); } }

function refresh() { 
    const sel = document.getElementById("notes"); sel.innerHTML=""; 
    for(let n in notes){ let o=document.createElement("option"); o.value=o.textContent=n; sel.appendChild(o); }
    sel.value=current; editor.value = notes[current] || ""; handleInput();
}

function saveTxt() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([editor.value], {type:"text/plain"})); a.download = current+".txt"; a.click(); }
function saveIni() { const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([editor.value], {type:"text/plain"})); a.download = current+".ini"; a.click(); }

function importTxt(){
    const fi = document.getElementById("fileInput"); fi.click();
    fi.onchange = () => {
        const f = fi.files[0]; if(!f) return;
        const r = new FileReader();
        if(f.name.endsWith('.zip')){
            r.onload = e => { JSZip.loadAsync(e.target.result).then(zip => { zip.forEach((path, file) => { if(path.endsWith('.txt') || path.endsWith('.ini')) file.async("string").then(content => { let n = path.split('.')[0]; notes[n] = content; current = n; refresh(); }); }); }); };
            r.readAsArrayBuffer(f);
        } else {
            r.onload = e => { let n = f.name.split('.')[0]; notes[n]=e.target.result; current=n; refresh(); };
            r.readAsText(f);
        }
    };
}

function changeFont() { editor.style.fontFamily = highlight.style.fontFamily = document.getElementById("fontFamily").value; }
function changeSize() { editor.style.fontSize = highlight.style.fontSize = document.getElementById("fontSize").value + "px"; }
function setZenburn(on) { if(on) document.body.classList.add("zenburn-mode"); else document.body.classList.remove("zenburn-mode"); applyHighlight(); }
function speakText(){ window.speechSynthesis.cancel(); const m=new SpeechSynthesisUtterance(editor.value); m.lang='hu-HU'; window.speechSynthesis.speak(m); }
function stopSpeak(){ window.speechSynthesis.cancel(); }
function downloadPDF() {
    const h = document.getElementById("pdf-helper"); h.style.fontFamily = editor.style.fontFamily; h.innerText = editor.value;
    html2canvas(h).then(c => { const pdf = new jspdf.jsPDF(); pdf.addImage(c.toDataURL("image/png"), 'PNG', 0, 0, 210, (c.height * 210) / c.width); pdf.save(current + ".pdf"); });
}
function downloadAllZip() {
    const zip = new JSZip(); for(let n in notes) zip.file(n + ".txt", notes[n]);
    zip.generateAsync({type:"blob"}).then(c => { const a = document.createElement("a"); a.href = URL.createObjectURL(c); a.download = "jegyzetek.zip"; a.click(); });
}
function toggleDark() { document.body.classList.toggle("light"); }

refresh();
</script>
