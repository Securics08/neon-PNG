            Comic Sans Bold</option>

          </option>
        </select>
        <label>Méret:</label>
        <input type="range" id="sizeRange" min="8" max="250" value="20" oninput="setSize(this.value)"> <span
          id="sizeValue">20</span>px
        <button onclick="resetColor()">Reset szín</button>
        <button id="glowBtn" class="on" onclick="toggleGlow()">Glow ON</button>
        <button onclick="toggleTheme()">🌓 Sötétítő</button>
        <input type="text" id="linkInput" placeholder="Link..." />
        <button onclick="insertLink()">Beszúrás</button>
        <button onclick="newNote()">+ Új lap</button>
      </div>
      <div class="toolbar">
        <button onclick="loadNote()">Betöltés</button> <button onclick="saveNote()">MENTÉS (.JSON)</button> <button
          onclick="deleteNote()">Törlés</button> <button onclick="exportNotes()">EXPORT (ÖSSZES)</button>
        <input type="file" id="importInput" style="display:none" onchange="processImport(event)" accept=".json">
        <button onclick="document.getElementById('importInput').click()">Import (.json)</button>
        <button onclick="downloadPNG(false)">PNG fekete</button> <button onclick="downloadPNG(true)">PNG
          átlátszó</button>
        <button onclick="downloadPDF(false)">PDF FF</button> <button onclick="downloadPDF(true)"
          style="background:#7a001f">PDF Színes</button>
        <button onclick="insertHTMLPrompt()" style="background:#0055ff; border-color:#00f6ff">HTML BEILLESZTÉS</button>
      </div>
      <div id="savePath" style="margin-top:6px; font-family: 'Courier New', monospace; line-height: 1.6;">
        <div><span class="label-red">Mentés helye:</span> <span class="label-yellow">Letöltések mappa</span></div>
        <div id="lastFileDisplay"><span class="label-red">Utolsó fájl:</span> <span class="label-green">Nincs
            mentés</span></div>
        <div id="timeDisplay"><span class="label-red">Időpont:</span> <span class="label-cyan">--:--:--</span></div>
        <div id="freeMemoryDisplay"><span class="label-red">Szabad memória:</span> <span class="label-cyan"></span>
        </div>
      </div>
      <div id="storageInfo"></div>
      <div class="storage-bar-bg">
        <div id="storageBarFill"></div>
      </div>
      <div id="captureArea">
        <div id="editorHeader" contenteditable="true"></div>
        <div id="editor" class="editor" contenteditable="true"></div>
      </div>
    </div>
    <div class="saved-panel">
      <h3>Mentett jegyzetek</h3>
      <div id="savedList"></div> <button class="clear-btn" onclick="clearList()"
        style="background:#7a001f; color:white; border:1px solid red; padding:10px; cursor:pointer;">Lista
        ürítése</button>
    </div>
  </div>
  <div id="pdf-helper-wrap"></div>
  <script>
    const editor = document.getElementById("editor"); const editorHeader = document.getElementById("editorHeader"); const captureArea = document.getElementById("captureArea"); const savedList = document.getElementById("savedList"); const storageInfo = document.getElementById("storageInfo"); const storageBarFill = document.getElementById("storageBarFill"); const linkInput = document.getElementById("linkInput"); const glowBtn = document.getElementById("glowBtn"); const lastFileDisplay = document.getElementById("lastFileDisplay"); const timeDisplay = document.getElementById("timeDisplay"); let activeColorClass = "neon-white"; let glowOn = true; let notes = [];
    let db;

    activeColorClass = localStorage.getItem("selectedNeonColor") || "neon-white";


    // Keresd meg ezt a részt és írd át így:
    window.addEventListener("load", () => {
      const savedColor = localStorage.getItem("selectedNeonColor");
      console.log(savedColor)

      if (savedColor) {
        activeColorClass = savedColor;
        applyColorAndSet(null, activeColorClass)
        // Opcionális: itt beállíthatnál egy vizuális visszajelzést is a gombokon
      } else {
        activeColorClass = "neon-white"; // Alapértelmezett, ha nincs mentve semmi
      }
    });

    const dbRequest = indexedDB.open("NeonNotesDB", 1);
    dbRequest.onupgradeneeded = e => { db = e.target.result; db.createObjectStore("notes", { keyPath: "id", autoIncrement: true }); };
    dbRequest.onsuccess = e => { db = e.target.result; loadFromDB(); };

    function getFormattedTimestamp() {
      const now = new Date();
      return `${now.getFullYear()}_${now.getMonth() + 1}_${now.getDate()}_${now.getHours()}-${now.getMinutes()}-${now.getSeconds()}`;
    }

    async function downloadPNG(trans) {
      const area = document.getElementById("captureArea");
      const header = document.getElementById("editorHeader");
      const originalBg = area.style.background;
      const originalBorder = area.style.border;
      const headerBorder = header.style.borderBottom;
      if (trans) { area.style.background = "transparent"; area.style.border = "none"; header.style.borderBottom = "none"; }
      const canvas = await html2canvas(area, { backgroundColor: trans ? null : "#050505", scale: 2, useCORS: true, logging: false });
      if (trans) { area.style.background = originalBg; area.style.border = originalBorder; header.style.borderBottom = headerBorder; }
      const a = document.createElement("a");
      a.download = `note_${getFormattedTimestamp()}.png`;
      a.href = canvas.toDataURL("image/png");
      a.click();
    }

    function saveNote() {
      const currentTitle = editorHeader.innerText || "JEGYZET";
      const name = prompt("Add meg a jegyzet nevét:", currentTitle);
      if (!name) return;
      const ts = getFormattedTimestamp();
      const fileName = `${name}_PNG_Save_${ts}`;
      const noteObj = { name: name, content: editor.innerHTML, timestamp: new Date().toLocaleString('hu-HU'), color: activeColorClass };
      const tx = db.transaction("notes", "readwrite");
      tx.objectStore("notes").add(noteObj);
      tx.oncomplete = () => {
        editorHeader.innerText = name;
        loadFromDB();
        downloadFile(JSON.stringify(noteObj), fileName);
        lastFileDisplay.innerHTML = `<span class="label-red">Utolsó fájl:</span> <span class="label-green">${fileName}.json</span>`;
        timeDisplay.innerHTML = `<span class="label-red">Időpont:</span> <span class="label-cyan">${noteObj.timestamp}</span>`;
      };
    }

    function processImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const importedData = JSON.parse(e.target.result);
          const tx = db.transaction("notes", "readwrite");
          const store = tx.objectStore("notes");
          if (Array.isArray(importedData)) {
            importedData.forEach(item => { delete item.id; store.add(item); });
          } else {
            delete importedData.id; store.add(importedData);
          }
          tx.oncomplete = () => { loadFromDB(); alert("Importálás sikeres!"); };
        } catch (err) { alert("Hiba a fájl feldolgozásakor!"); }
      };
      reader.readAsText(file);
    }

    function exportNotes() {
      if (notes.length === 0) { alert("Nincs mit exportálni!"); return; }
      const name = prompt("Add meg az exportált fájl nevét:", "ÖSSZES_JEGYZET");
      if (!name) return;
      const ts = getFormattedTimestamp();
      const exportFileName = `${name}_PNG_EXPORT_${ts}`;
      downloadFile(JSON.stringify(notes), exportFileName);
      lastFileDisplay.innerHTML = `<span class="label-red">Utolsó fájl:</span> <span class="label-green">${exportFileName}.json</span>`;
      timeDisplay.innerHTML = `<span class="label-red">Időpont:</span> <span class="label-cyan">${new Date().toLocaleString('hu-HU')}</span>`;
    }

    function loadFromDB() {
      const transaction = db.transaction("notes", "readonly");
      const store = transaction.objectStore("notes");
      const request = store.getAll();
      request.onsuccess = () => { notes = request.result; refreshListUI(); updateStorageStatus(); };
    }

    function refreshListUI() {
      savedList.innerHTML = "";
      notes.forEach(note => {
        const item = document.createElement("div");
        item.className = "saved-item";
        item.innerHTML = `<span class="${note.color}">${note.name}</span>`;
        item.onclick = () => { editor.innerHTML = note.content; editorHeader.innerText = note.name; };
        savedList.appendChild(item);
      });
    }

    function setFont() {
      const font = document.getElementById("fontSelect").value;
      const isBold = font.includes("Bold");
      const family = isBold ? font.replace(" Bold", "") : font;
      document.execCommand('fontName', false, family);
      if (isBold) document.execCommand('bold', false, null);
    }

    function setSize(size) {
      document.getElementById("sizeValue").innerText = size;
      const selection = window.getSelection();
      if (!selection.rangeCount) return;
      const range = selection.getRangeAt(0);
      const span = document.createElement("span");
      span.style.fontSize = size + "px";
      if (range.collapsed) {
        span.innerHTML = "&#8203;";
        range.insertNode(span);
        range.setStartAfter(span);
        selection.removeAllRanges();
        selection.addRange(range);
      } else {
        span.appendChild(range.extractContents());
        range.insertNode(span);
      }
    }

    function insertHTMLPrompt() {
      const htmlCode = prompt("Másold be ide a beillesztendő HTML kódot:");
      if (htmlCode) {
        const span = document.createElement("span");
        span.className = activeColorClass;
        span.textContent = htmlCode;
        editor.appendChild(span);
        editor.appendChild(document.createElement("br"));
        editor.scrollTop = editor.scrollHeight;
      }
    }

    function downloadFile(content, name) {
      const blob = new Blob([content], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = name + ".json";
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    function updateStorageStatus() {
      const totalMax = 500 * 1024 * 1024;
      let size = new Blob([JSON.stringify(notes)]).size;
      const usedMB = (size / (1024 * 1024)).toFixed(2);
      storageBarFill.style.width = Math.min(100, (size / totalMax) * 100) + "%";
      document.getElementById("freeMemoryDisplay").innerHTML = `<span class="label-red">Szabad:</span> <span class="label-cyan">${(500 - usedMB).toFixed(2)} MB</span>`;
    }

    function applyColorAndSet(e, className) {
      if (e) e.preventDefault();

      activeColorClass = className;
      localStorage.setItem("selectedNeonColor", className);

      // Először fókuszáljunk az editorra, ha nem ott lennénk
      editor.focus();

      const selection = window.getSelection();

      // Ellenőrizzük, hogy van-e érvényes kijelölési tartomány
      if (selection.rangeCount === 0) {
        // Ha nincs tartomány, készítünk egyet az editor végére
        const range = document.createRange();
        range.selectNodeContents(editor);
        range.collapse(false); // A végére ugrik
        selection.removeAllRanges();
        selection.addRange(range);
      }

      if (selection.toString().length > 0) {
        let range = selection.getRangeAt(0);
        let span = document.createElement("span");
        span.className = className;
        span.textContent = selection.toString();
        range.deleteContents();
        range.insertNode(span);
      } else {
        const span = document.createElement("span");
        span.className = className;
        span.innerHTML = "&#8203;";
        const range = selection.getRangeAt(0);
        range.insertNode(span);
        range.setStart(span, 1);
        range.collapse(true);
        selection.removeAllRanges();
        selection.addRange(range);
      }
    }
    function toggleGlow() {
      glowOn = !glowOn;
      document.body.classList.toggle("glow-off");
      glowBtn.classList.toggle("on");
      glowBtn.classList.toggle("off");
      glowBtn.innerText = glowOn ? "Glow ON" : "Glow OFF";
    }
    function toggleTheme() { document.body.classList.toggle("light-mode"); }
    function newNote() { editor.innerHTML = ""; editorHeader.innerText = ""; }
    function resetColor() {
      activeColorClass = "neon-white";
      localStorage.setItem("selectedNeonColor", "neon-white");
    }
    function hardReset() { if (confirm("MINDEN TÖRLŐDIK!")) { const tx = db.transaction("notes", "readwrite"); tx.objectStore("notes").clear(); tx.oncomplete = () => location.reload(); } }
    function clearList() { if (confirm("Lista ürítése?")) { const tx = db.transaction("notes", "readwrite"); tx.objectStore("notes").clear(); tx.oncomplete = () => loadFromDB(); } }
    function insertLink() { const url = linkInput.value; if (url) document.execCommand('createLink', false, url); }

    function deleteNote() {
      const currentName = editorHeader.innerText;

      if (!currentName || currentName === "") {
        alert("Nincs kiválasztott vagy elnevezett jegyzet a törléshez.");
        return;
      }

      if (confirm(`Biztosan törlöd a(z) "${currentName}" nevű jegyzetet a mentettek közül?`)) {
        // Megkeressük a jegyzetet a memóriában lévő listában név alapján
        const foundNote = notes.find(n => n.name === currentName);

        if (foundNote && foundNote.id) {
          const transaction = db.transaction("notes", "readwrite");
          const store = transaction.objectStore("notes");

          // Törlés az adatbázisból az ID alapján
          const request = store.delete(foundNote.id);

          transaction.oncomplete = () => {
            loadFromDB(); // Lista frissítése a képernyőn
            newNote();    // Szerkesztőfelület ürítése
            alert("Jegyzet sikeresen törölve a memóriából.");
          };

          transaction.onerror = () => {
            alert("Hiba történt a törlés során.");
          };
        } else {
          alert("Ez a jegyzet még nincs mentve az adatbázisba, vagy a neve megváltozott.");
        }
      }
    }
  </script>
