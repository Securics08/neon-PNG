<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>RGB Gamer Screenshot - TOTAL FRAME FIX</title>
<style>
body {
    margin: 0; font-family: Arial, sans-serif; color: white;
    display: flex; justify-content: center; align-items: center;
    height: 100vh; overflow: hidden; background-color: #050505;
}

body::before {
    content: ""; position: fixed; width: 100%; height: 100%;
    background: linear-gradient(45deg, #1a0000, #1a1000, #001a00, #00001a, #1a001a);
    background-size: 400%; animation: rgbmove 20s linear infinite;
    filter: blur(100px); z-index: -1; opacity: 0.4;
}

@keyframes rgbmove { 0% { background-position: 0% 50%; } 100% { background-position: 400% 50%; } }

.card {
    background: rgba(0,0,0,0.85); padding: 30px; border-radius: 20px;
    width: 450px; max-height: 90vh; text-align: center;
    box-shadow: 0 0 30px rgba(106, 0, 255, 0.3); overflow-y: auto;
}

.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }

button {
    padding: 10px; border-radius: 8px; border: none;
    background: #6a00ff; color: white; font-weight: bold;
    cursor: pointer; transition: 0.2s;
}

button:hover { transform: scale(1.02); background: #9d4edd; }

.slider-container { margin-top: 15px; text-align: left; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; }
input[type="range"] { width: 100%; cursor: pointer; }

.overlay {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 2000;
}

.editor-box { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #6a00ff; text-align: center; width: 720px; }

.zoom-container {
    position: relative; width: 600px; height: 400px; margin: 0 auto;
    border: 3px solid #6a00ff; overflow: hidden; background: #000; cursor: move;
}

#previewVideo {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
    will-change: transform;
    transform-origin: 0 0;
}

.btn-row { margin-top: 20px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>

<div class="card">
    <h2>🎮 RGB Gamer Screenshot</h2>
    <div class="grid">
        <button onclick="capture(3840,2160)">4K</button>
        <button onclick="capture(2560,1440)">2K</button>
        <button onclick="capture(1920,1080)">Full HD</button>
        <button onclick="capture(1280,720)">HD</button>
        <button onclick="capture(1080,1080)">1080×1080</button>
        <button onclick="capture(1200,628)">1200×628</button>
        <button onclick="capture(800,600)">800×600</button>
        <button onclick="capture(640,480)">640×480</button>
        <button onclick="capture(256,256)">256×256</button>
        <button onclick="capture(128,128)">128×128</button>
        <button onclick="capture(64,64)">64×64</button>
        <button onclick="capture(32,32)">32×32 (RA2 ikon)</button>
    </div>
    <div class="slider-container">
        <label>Szélesség: <span id="wL">800</span> px</label>
        <input type="range" id="wS" min="32" max="3840" value="800">
        <label>Magasság: <span id="hL">600</span> px</label>
        <input type="range" id="hS" min="32" max="2160" value="600">
        <button style="margin-top:10px; width:100%;" onclick="captureSlider()">🎯 Képernyőkép csúszkával</button>
    </div>
</div>

<script>
const wS = document.getElementById("wS"), hS = document.getElementById("hS");
const wL = document.getElementById("wL"), hL = document.getElementById("hL");
wS.oninput = () => wL.textContent = wS.value;
hS.oninput = () => hL.textContent = hS.value;

let stream = null, targetW, targetH;
let zoom = 1, offX = 0, offY = 0;
let baseScale = 1;

async function capture(w, h) {
    targetW = w; targetH = h;
    try {
        stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "never" } });
        showEditor();
    } catch (e) { console.error(e); }
}

function captureSlider() { capture(parseInt(wS.value), parseInt(hS.value)); }

function showEditor() {
    const ov = document.createElement('div');
    ov.className = 'overlay';
    ov.innerHTML = `
        <div class="editor-box">
            <h3 style="color:#6a00ff;">Teljes kép vágása - Nincs levágás alapnál</h3>
            <div class="zoom-container" id="box">
                <video id="previewVideo" autoplay playsinline></video>
            </div>
            <div class="btn-row">
                <button id="savePNG" style="background:#28a745;">💾 PNG</button>
                <button id="saveJPG" style="background:#218838;">💾 JPG</button>
                <button id="saveJPEG" style="background:#1e7e34;">💾 JPEG</button>
                <button id="reset" style="background:#ffaa00;">↺ ALAPHELYZET</button>
                <button id="close" style="background:#cc0000;">Bezár</button>
            </div>
        </div>
    `;
    document.body.appendChild(ov);

    const video = document.getElementById('previewVideo');
    const box = document.getElementById('box');
    video.srcObject = stream;

    function update() {
        video.style.width = (video.videoWidth * baseScale * zoom) + "px";
        video.style.height = (video.videoHeight * baseScale * zoom) + "px";
        video.style.left = offX + "px";
        video.style.top = offY + "px";
    }

    function fullReset() {
        const vW = video.videoWidth;
        const vH = video.videoHeight;
        const bW = box.offsetWidth;
        const bH = box.offsetHeight;

        // FONTOS VÁLTOZATÁS: Math.min-t használunk, hogy a TELJES kép beleférjen levágás nélkül
        baseScale = Math.min(bW / vW, bH / vH);
        
        zoom = 1;
        // Középre igazítás a lila kereten belül
        offX = (bW - vW * baseScale) / 2;
        offY = (bH - vH * baseScale) / 2;
        
        update();
    }

    video.onloadedmetadata = fullReset;

    box.onwheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 1.1 : 0.9;
        const rect = box.getBoundingClientRect();
        const mX = e.clientX - rect.left;
        const mY = e.clientY - rect.top;
        offX = mX - (mX - offX) * delta;
        offY = mY - (mY - offY) * delta;
        zoom *= delta;
        update();
    };

    let isDrag = false, lastX, lastY;
    box.onmousedown = (e) => { isDrag = true; lastX = e.clientX; lastY = e.clientY; };
    window.onmousemove = (e) => { 
        if(isDrag) { 
            offX += e.clientX - lastX; 
            offY += e.clientY - lastY; 
            lastX = e.clientX; lastY = e.clientY;
            update(); 
        } 
    };
    window.onmouseup = () => isDrag = false;

    function saveImage(format) {
        const canvas = document.createElement('canvas');
        canvas.width = targetW; canvas.height = targetH;
        const ctx = canvas.getContext('2d');

        const currentScale = baseScale * zoom;
        const sx = -offX / currentScale;
        const sy = -offY / currentScale;
        const sw = box.offsetWidth / currentScale;
        const sh = box.offsetHeight / currentScale;

        // Fekete háttér a mentett képen is, ha a vágás "kilógna"
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, targetW, targetH);
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, targetW, targetH);
        
        const a = document.createElement('a');
        const mime = format === 'png' ? 'image/png' : 'image/jpeg';
        a.download = `screenshot_${targetW}x${targetH}.${format}`;
        a.href = canvas.toDataURL(mime, 1.0);
        a.click();
    }

    document.getElementById('savePNG').onclick = () => saveImage('png');
    document.getElementById('saveJPG').onclick = () => saveImage('jpg');
    document.getElementById('saveJPEG').onclick = () => saveImage('jpeg');
    document.getElementById('reset').onclick = fullReset;
    document.getElementById('close').onclick = () => {
        document.body.removeChild(ov);
        if(stream) stream.getTracks().forEach(t => t.stop());
    };
}
</script>
</body>
</html>
